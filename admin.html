<!DOCTYPE html>
<html lang="ja">
<head>
  <meta name="robots" content="noindex">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サイトマップジェネレーター | 管理画面</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #4F46E5;
      --primary-light: #EEF2FF;
      --gray-50:  #F8FAFC;
      --gray-100: #F1F5F9;
      --gray-200: #E2E8F0;
      --gray-300: #CBD5E1;
      --gray-400: #94A3B8;
      --gray-500: #64748B;
      --gray-600: #475569;
      --gray-900: #0F172A;
      --white:    #FFFFFF;
      --radius:   8px;
      --radius-lg: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-size: 14px;
    }

    /* ===== ヘッダー ===== */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      flex-shrink: 0;
      gap: 12px;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-brand .logo-icon {
      font-size: 20px;
      line-height: 1;
    }

    .header-brand h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      background: var(--primary-light);
      color: var(--primary);
      border-radius: 999px;
      letter-spacing: 0.03em;
    }

    .header-actions { display: flex; gap: 8px; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 14px;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-ghost {
      background: transparent;
      color: var(--gray-600);
      border: 1px solid var(--gray-200);
    }
    .btn-ghost:hover { background: var(--gray-100); }

    .btn-primary {
      background: var(--primary);
      color: white;
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79,70,229,.3); }
    .btn-primary:active { transform: translateY(0); }

    /* ===== ボディ ===== */
    .app-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ===== サイドバー ===== */
    .sidebar {
      width: 360px;
      flex-shrink: 0;
      background: var(--white);
      border-right: 1px solid var(--gray-200);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-tabs {
      display: flex;
      border-bottom: 1px solid var(--gray-200);
      flex-shrink: 0;
    }

    .sidebar-tab {
      flex: 1;
      padding: 10px 0;
      border: none;
      background: transparent;
      font-size: 13px;
      font-weight: 500;
      color: var(--gray-400);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .sidebar-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .sidebar-tab:hover:not(.active) { color: var(--gray-600); }

    .sidebar-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    /* スクロールバー（マウス操作デバイスのみ） */
    @media (pointer: fine) {
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--gray-100); border-radius: 3px; }
      ::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--gray-400); }
    }

    /* ===== フォーム ===== */
    .form-section { margin-bottom: 20px; }

    .form-section-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .form-field { margin-bottom: 10px; }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--gray-600);
      margin-bottom: 4px;
    }

    .form-input, .form-select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
      color: var(--gray-900);
      background: var(--white);
    }
    .form-input:focus, .form-select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.08); }

    /* カラー選択 */
    .color-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .color-chip {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
      outline: 2px solid transparent;
    }
    .color-chip:hover { transform: scale(1.15); }
    .color-chip.active { outline-color: var(--gray-900); outline-offset: 2px; }

    /* ===== ページエディタ ===== */
    .pages-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .pages-header .form-section-title { margin-bottom: 0; }

    .add-root-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border: 1px dashed var(--gray-300);
      border-radius: var(--radius);
      background: transparent;
      color: var(--gray-500);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .add-root-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

    /* ページアイテム */
    .pe-list { display: flex; flex-direction: column; gap: 6px; }

    .pe-item {
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      background: var(--white);
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .pe-item:hover { border-color: var(--gray-300); }

    .pe-item-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 8px 8px 10px;
      background: var(--gray-50);
    }

    .pe-icon-btn {
      font-size: 18px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px;
      border-radius: 4px;
      transition: background 0.15s;
      line-height: 1;
      flex-shrink: 0;
    }
    .pe-icon-btn:hover { background: var(--gray-200); }

    .pe-name {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 13px;
      font-weight: 600;
      outline: none;
      color: var(--gray-900);
      min-width: 0;
    }
    .pe-name::placeholder { color: var(--gray-300); font-weight: 400; }

    .pe-btns {
      display: flex;
      gap: 2px;
      flex-shrink: 0;
    }

    .ib {
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      color: var(--gray-400);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.12s;
    }
    .ib:hover { background: var(--gray-200); color: var(--gray-900); }
    .ib:disabled { opacity: 0.3; cursor: not-allowed; }
    .ib.add { border: 1px solid #C7D2FE; background: var(--primary-light); color: var(--primary); }
    .ib.add:hover { background: #E0E7FF; color: #3730A3; border-color: #A5B4FC; }
    .ib.del { border: 1px solid var(--gray-200); background: var(--gray-50); color: var(--gray-400); }
    .ib.del:hover { background: #FEF2F2; color: #DC2626; border-color: #FECACA; }

    .pe-body {
      padding: 6px 10px 8px;
    }

    .pe-desc {
      width: 100%;
      border: none;
      font-size: 12px;
      color: var(--gray-500);
      resize: none;
      outline: none;
      background: transparent;
      line-height: 1.6;
      font-family: inherit;
      min-height: 36px;
    }
    .pe-desc::placeholder { color: var(--gray-300); }

    .pe-children {
      padding: 4px 8px 8px 16px;
      border-top: 1px solid var(--gray-100);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .pe-empty {
      text-align: center;
      color: var(--gray-400);
      font-size: 13px;
      padding: 40px 20px;
      line-height: 1.8;
    }

    /* ===== プレビューパネル ===== */
    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    .preview-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      flex-shrink: 0;
      gap: 12px;
    }

    .preview-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .preview-note {
      font-size: 11px;
      color: var(--gray-400);
    }

    .preview-content {
      flex: 1;
      overflow: auto;
      background: #EEF2FF;
      background-image: radial-gradient(circle at 20px 20px, rgba(79,70,229,.06) 2px, transparent 0);
      background-size: 40px 40px;
    }

    /* ===== サイトマッププレビュー ===== */
    .sm-wrap {
      min-height: 100%;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .sm-header {
      margin-bottom: 28px;
      padding: 20px 24px;
      background: white;
      border-radius: var(--radius-lg);
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
      width: 100%;
      max-width: 800px;
    }

    .sm-header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .sm-site-name {
      font-size: 18px;
      font-weight: 800;
      color: var(--gray-900);
      letter-spacing: -0.02em;
    }

    .sm-meta {
      font-size: 12px;
      color: var(--gray-400);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
    }

    .sm-note {
      margin-top: 6px;
      font-size: 11px;
      color: var(--gray-400);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ツリー */
    .sm-tree { width: 100%; }

    .sm-tree ul {
      list-style: none;
      padding: 0;
      margin: 0;
      padding-left: 20px;
      position: relative;
    }

    /* 縦線 */
    .sm-tree ul::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 12px;
      width: 2px;
      background: var(--sm-line, #C7D2FE);
      border-radius: 1px;
    }

    .sm-tree li {
      position: relative;
      margin-bottom: 8px;
    }

    /* 横線 */
    .sm-tree li::before {
      content: '';
      position: absolute;
      left: -20px;
      top: 18px;
      width: 16px;
      height: 2px;
      background: var(--sm-line, #C7D2FE);
    }

    .sm-tree > ul::before { display: none; }
    .sm-tree > ul > li::before { display: none; }

    .sm-node-card {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.07);
      cursor: pointer;
      border-left: 4px solid var(--sm-color, #4F46E5);
      transition: all 0.18s;
      min-width: 140px;
      max-width: 380px;
      position: relative;
      user-select: none;
    }
    .sm-node-card:hover {
      transform: translateX(3px);
      box-shadow: 0 4px 16px rgba(0,0,0,.12);
    }

    .sm-node-icon { font-size: 16px; flex-shrink: 0; }

    .sm-node-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-900);
      flex: 1;
    }

    .sm-node-desc-hint {
      font-size: 10px;
      color: var(--gray-400);
      white-space: nowrap;
    }

    .sm-toggle {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--gray-100);
      border: none;
      cursor: pointer;
      font-size: 9px;
      color: var(--gray-500);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .sm-toggle:hover { background: var(--gray-200); }
    .sm-toggle.open { background: var(--sm-color, #4F46E5); color: white; }

    .sm-node-children {
      margin-top: 6px;
      overflow: hidden;
    }

    /* ルートノードは大きめ */
    .sm-tree > ul > li > .sm-node-card {
      padding: 14px 20px;
      border-radius: 12px;
      border-left-width: 5px;
    }
    .sm-tree > ul > li > .sm-node-card .sm-node-name {
      font-size: 15px;
    }
    .sm-tree > ul > li > .sm-node-card .sm-node-icon {
      font-size: 20px;
    }

    .sm-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: var(--gray-400);
      text-align: center;
      gap: 8px;
    }

    .sm-empty .empty-icon { font-size: 40px; opacity: .4; }
    .sm-empty p { font-size: 14px; line-height: 1.8; }

    /* ===== アイコンピッカー ===== */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      display: none;
      align-items: flex-start;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }
    .overlay.show { display: flex; }

    .overlay-box {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      max-width: 360px;
      width: 90%;
      max-height: calc(100vh - 32px);
      overflow-y: auto;
    }

    .overlay-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--gray-900);
    }

    .icon-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 6px;
    }

    .icon-option {
      aspect-ratio: 1;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.12s;
    }
    .icon-option:hover { background: var(--gray-100); border-color: var(--gray-200); }
    .icon-option.selected { background: var(--primary-light); border-color: var(--primary); }

    .overlay-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }

    /* ===== エクスポート成功トースト ===== */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 18px;
      background: var(--gray-900);
      color: white;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
      z-index: 2000;
      pointer-events: none;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* ===== サンプル選択モーダル ===== */
    .sample-type-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 4px;
    }

    .sample-type-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      padding: 18px 12px 14px;
      border: 2px solid var(--gray-200);
      border-radius: var(--radius-lg);
      background: transparent;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
      font-family: inherit;
      width: 100%;
    }
    .sample-type-card:hover {
      border-color: var(--primary);
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(79,70,229,.12);
    }
    .sample-type-card:active { transform: translateY(0); }

    .stc-icon { font-size: 28px; line-height: 1; }
    .stc-name { font-size: 13px; font-weight: 700; color: var(--gray-900); }
    .stc-desc { font-size: 11px; color: var(--gray-400); line-height: 1.4; }

    /* ===== モバイルタブ ===== */
    .mobile-tabs { display: none; }
    .mobile-sub-actions { display: none; }

    /* ===== タブレット（641px〜1024px）: 2カラム維持、サイドバー幅縮小 ===== */
    @media (max-width: 1024px) and (min-width: 641px) {
      .sidebar { width: 280px; }
      .hide-sm { display: none !important; }
      .btn-primary { font-size: 12px; padding: 7px 11px; }
      .header-brand h1 { font-size: 13px; }
    }

    /* ===== スマホ（〜640px）: 1カラム＋タブ切替 ===== */
    @media (max-width: 640px) {
      /* ヘッダー */
      .header-brand h1 { font-size: 13px; }
      .badge { display: none; }
      .hide-xs { display: none; }
      .hide-sm { display: none !important; }

      /* モバイルタブ */
      .mobile-tabs {
        display: flex;
        background: var(--white);
        border-bottom: 1px solid var(--gray-200);
        flex-shrink: 0;
      }
      .mobile-tab {
        flex: 1;
        padding: 11px 4px;
        border: none;
        background: transparent;
        font-size: 12px;
        font-weight: 500;
        color: var(--gray-400);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all 0.15s;
        -webkit-tap-highlight-color: transparent;
      }
      .mobile-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

      /* 設定タブ内のサブアクション（モバイルのみ表示） */
      .mobile-sub-actions { display: block; }

      /* サイドバー内タブを非表示（モバイルタブで代替） */
      .sidebar-tabs { display: none; }

      /* レイアウト */
      .app-body { flex-direction: column; }
      .sidebar { width: 100%; flex: 1; border-right: none; }
      .preview-panel { display: none; flex: 1; }

      /* モバイルビュー切替用クラス */
      .sidebar.mv-hide { display: none !important; }
      .preview-panel.mv-show { display: flex !important; }

      /* サンプル選択モーダル：1列 */
      .sample-type-grid { grid-template-columns: 1fr; }

      /* プレビュー内：縦並びレイアウト */
      .sm-header-top { flex-direction: column; align-items: flex-start; gap: 4px; }
      .sm-meta { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
      .sm-meta-sep { display: none; }
    }

    /* ===== 下部 追加ボタン ===== */
    .add-root-bottom-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border: 1.5px dashed var(--gray-300);
      border-radius: var(--radius);
      background: transparent;
      color: var(--gray-500);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .add-root-bottom-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-light);
    }

    /* ===== トグルスイッチ ===== */
    .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }
    .toggle-label { font-size: 13px; color: var(--gray-600); font-weight: 500; }
    .toggle-sub { font-size: 11px; color: var(--gray-400); margin-top: 2px; }
    .toggle-switch { position: relative; display: inline-block; width: 40px; height: 22px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track { position: absolute; inset: 0; background: var(--gray-200); border-radius: 999px; cursor: pointer; transition: background 0.2s; }
    .toggle-track::after { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: transform 0.2s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
    .toggle-switch input:checked + .toggle-track { background: var(--primary); }
    .toggle-switch input:checked + .toggle-track::after { transform: translateX(18px); }

  </style>
</head>
<body>

<!-- ===== ヘッダー ===== -->
<header class="app-header">
  <div class="header-brand">
    <h1>サイトマップジェネレーター</h1>
    <span class="badge">管理画面</span>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost hide-sm" onclick="openSampleModal()" style="border-color:var(--primary)">📂 サンプル読込</button>
    <button class="btn btn-ghost hide-sm" onclick="resetData()" title="データをリセット">🔄 リセット</button>
    <button class="btn btn-ghost hide-sm" onclick="exportPDF()">🖨️ PDFで保存</button>
    <button class="btn btn-primary" onclick="exportHTML()">⬇️ <span class="hide-xs">HTML形式で</span>ダウンロード</button>
  </div>
</header>

<!-- ===== モバイルタブ（PCでは非表示） ===== -->

<div id="toast" class="toast">✅ HTMLをダウンロードしました</div>

<script>
// ============================================================
// データ
// ============================================================

const COLORS = [
  { name: 'インディゴ',  value: '#4F46E5', line: '#C7D2FE' },
  { name: 'ブルー',      value: '#2563EB', line: '#BFDBFE' },
  { name: 'ティール',    value: '#0D9488', line: '#99F6E4' },
  { name: 'グリーン',    value: '#16A34A', line: '#BBF7D0' },
  { name: 'パープル',    value: '#7C3AED', line: '#DDD6FE' },
  { name: 'ピンク',      value: '#DB2777', line: '#FBCFE8' },
  { name: 'オレンジ',    value: '#EA580C', line: '#FED7AA' },
  { name: 'グレー',      value: '#374151', line: '#D1D5DB' },
];

const ICONS = [
  '📄','🏠','🏢','👥','🛍️','📞','📰','⭐',
  '🔧','📊','💡','🎯','🏆','❓','📷','🎨',
  '🌐','📱','💼','🔑','📍','✉️','🗂️','📋',
  '🔍','📈','💬','🎁','🚀','⚡','🌟','🎪',
];

let seq = 0;

function newPage(name = '新しいページ') {
  return { id: `p${++seq}`, name, icon: '📄', description: '', children: [] };
}

let data = {
  project: {
    name: '新しいウェブサイト',
    client: '',
    date: todayStr(),
    agency: '',
    note: 'このサイトマップは提案資料です。内容は変更になる場合があります。',
    color: COLORS[0].value,
    lineColor: COLORS[0].line,
    pdf2col: true,
    showIcon: true,
  },
  pages: []
};

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ============================================================
// ストレージ
// ============================================================

function save() {
  try { localStorage.setItem('sg_v1', JSON.stringify(data)); } catch(e) {}
}

function loadStored() {
  try {
    const s = localStorage.getItem('sg_v1');
    if (s) {
      data = JSON.parse(s);
      seq = calcMaxSeq(data.pages);
    }
  } catch(e) {}
}

function calcMaxSeq(pages) {
  let m = 0;
  for (const p of pages) {
    const n = parseInt(p.id.slice(1));
    if (!isNaN(n) && n > m) m = n;
    m = Math.max(m, calcMaxSeq(p.children));
  }
  return m;
}

// ============================================================
// ページ操作
// ============================================================

function findPage(nodes, id) {
  for (let i = 0; i < nodes.length; i++) {
    if (nodes[i].id === id) return { page: nodes[i], arr: nodes, idx: i };
    const r = findPage(nodes[i].children, id);
    if (r) return r;
  }
  return null;
}

function addRoot() {
  const pg = newPage('新しいページ');
  data.pages.push(pg);
  save(); renderAll();
  scrollToNewItem(pg.id);
}

function addChild(parentId) {
  const r = findPage(data.pages, parentId);
  if (r) {
    const pg = newPage('子ページ');
    r.page.children.push(pg);
    save(); renderAll();
    scrollToNewItem(pg.id);
  }
}

function scrollToNewItem(id) {
  setTimeout(() => {
    const el = document.querySelector(`[data-page-id="${id}"]`);
    if (!el) return;
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    el.style.transition = 'box-shadow 0.3s';
    el.style.boxShadow = '0 0 0 2px var(--primary), 0 4px 16px rgba(79,70,229,.2)';
    setTimeout(() => { el.style.boxShadow = ''; }, 1600);
  }, 60);
}

function removePage(id) {
  const r = findPage(data.pages, id);
  if (r) { r.arr.splice(r.idx, 1); save(); renderAll(); }
}

function moveUp(id) {
  const r = findPage(data.pages, id);
  if (r && r.idx > 0) {
    [r.arr[r.idx-1], r.arr[r.idx]] = [r.arr[r.idx], r.arr[r.idx-1]];
    save(); renderAll();
  }
}

function moveDown(id) {
  const r = findPage(data.pages, id);
  if (r && r.idx < r.arr.length - 1) {
    [r.arr[r.idx], r.arr[r.idx+1]] = [r.arr[r.idx+1], r.arr[r.idx]];
    save(); renderAll();
  }
}

function updatePageField(id, field, value) {
  const r = findPage(data.pages, id);
  if (r) { r.page[field] = value; save(); renderPreview(); }
}

function confirmDelete(id) {
  const r = findPage(data.pages, id);
  if (!r) return;
  const msg = r.page.children.length
    ? `「${r.page.name}」と子ページ（${r.page.children.length}件）を削除しますか？`
    : `「${r.page.name}」を削除しますか？`;
  if (confirm(msg)) removePage(id);
}

// ============================================================
// タブ切替（PC用）
// ============================================================

function switchTab(tab, btn) {
  document.querySelectorAll('.sidebar-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-pages').style.display = tab === 'pages' ? '' : 'none';
  document.getElementById('tab-settings').style.display = tab === 'settings' ? '' : 'none';
}

// ============================================================
// モバイルビュー切替
// ============================================================

function setMobileView(view, btn) {
  document.querySelectorAll('.mobile-tab').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  const sidebar = document.querySelector('.sidebar');
  const preview = document.querySelector('.preview-panel');
  const tabPages = document.getElementById('tab-pages');
  const tabSettings = document.getElementById('tab-settings');

  if (view === 'preview') {
    sidebar.classList.add('mv-hide');
    preview.classList.add('mv-show');
  } else {
    sidebar.classList.remove('mv-hide');
    preview.classList.remove('mv-show');
    // サイドバー内コンテンツ切替
    tabPages.style.display = view === 'pages' ? '' : 'none';
    tabSettings.style.display = view === 'settings' ? '' : 'none';
  }
}

// ============================================================
// プロジェクト設定
// ============================================================

function updateProject() {
  data.project.name     = document.getElementById('f-sitename').value;
  data.project.client   = document.getElementById('f-client').value;
  data.project.date     = document.getElementById('f-date').value;
  data.project.agency   = document.getElementById('f-agency').value;
  data.project.note     = document.getElementById('f-note').value;
  data.project.showIcon = document.getElementById('f-showicon').checked;
  save(); renderPreview(); renderEditor();
}

function setColor(color, lineColor) {
  data.project.color = color;
  data.project.lineColor = lineColor;
  document.querySelectorAll('.color-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.color === color);
  });
  save(); renderPreview();
}

function syncFormToData() {
  document.getElementById('f-sitename').value = data.project.name || '';
  document.getElementById('f-client').value   = data.project.client || '';
  document.getElementById('f-date').value     = data.project.date || todayStr();
  document.getElementById('f-agency').value   = data.project.agency || '';
  document.getElementById('f-note').value     = data.project.note || '';
  document.getElementById('f-showicon').checked  = data.project.showIcon !== false;
}

// ============================================================
// エディタレンダリング
// ============================================================

function renderAll() {
  renderEditor();
  renderPreview();
}

function renderEditor() {
  const el = document.getElementById('page-editor');
  const btn = document.getElementById('add-root-bottom');
  if (!data.pages.length) {
    el.innerHTML = `<div class="pe-empty">まだページがありません<br>「＋ ページを追加」から始めましょう</div>`;
    if (btn) btn.style.display = 'none';
    return;
  }
  el.innerHTML = renderPageItems(data.pages);
  if (btn) btn.style.display = 'flex';
}

function renderPageItems(pages) {
  return pages.map((p, i) => `
    <div class="pe-item" data-page-id="${p.id}">
      <div class="pe-item-header">
        ${data.project.showIcon !== false ? `<button class="pe-icon-btn" onclick="openIconPicker('${p.id}')" title="アイコン変更">${p.icon}</button>` : ''}
        <input class="pe-name" value="${esc(p.name)}" placeholder="ページ名"
               oninput="updatePageField('${p.id}','name',this.value)">
        <div class="pe-btns">
          <button class="ib" title="上へ" onclick="moveUp('${p.id}')" ${i === 0 ? 'disabled' : ''}>↑</button>
          <button class="ib" title="下へ" onclick="moveDown('${p.id}')" ${i === pages.length-1 ? 'disabled' : ''}>↓</button>
          <button class="ib add" title="子ページを追加" onclick="addChild('${p.id}')">＋</button>
          <button class="ib del" title="削除" onclick="confirmDelete('${p.id}')">✕</button>
        </div>
      </div>
      <div class="pe-body">
        <textarea class="pe-desc" placeholder="掲載コンテンツの例：代表挨拶、企業理念…（クリック時ポップアップに表示）"
                  oninput="updatePageField('${p.id}','description',this.value)">${esc(p.description)}</textarea>
      </div>
      ${p.children.length ? `<div class="pe-children">${renderPageItems(p.children)}</div>` : ''}
    </div>
  `).join('');
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// プレビューレンダリング
// ============================================================

function renderPreview() {
  const root = document.getElementById('preview-root');
  const color = data.project.color;
  const lineColor = data.project.lineColor || '#C7D2FE';

  const dateDisp = data.project.date
    ? data.project.date.replace(/-/g, '/').replace(/(\d{4})\/(\d{2})\/(\d{2})/, '$1年$2月$3日')
    : '';

  const metaParts = [];
  if (data.project.client) metaParts.push(`クライアント：${esc(data.project.client)}`);
  if (dateDisp) metaParts.push(`作成日：${dateDisp}`);
  if (data.project.agency) metaParts.push(`制作：${esc(data.project.agency)}`);

  root.innerHTML = `
    <div class="sm-wrap" style="--sm-color:${color};--sm-line:${lineColor}">
      <div class="sm-header">
        <div class="sm-header-top">
          <div class="sm-site-name">${esc(data.project.name || '新しいウェブサイト')}</div>
          <span style="padding:2px 10px;background:${color}18;color:${color};border-radius:999px;font-size:11px;font-weight:700">サイトマップ</span>
        </div>
        ${metaParts.length ? `<div class="sm-meta">${metaParts.map(m => `<span class="sm-meta-item">${m}</span>`).join('<span class="sm-meta-sep">　｜　</span>')}</div>` : ''}
        <div class="sm-note">💬 各ブロックをクリックすると掲載コンテンツを確認できます</div>
      </div>
      ${data.pages.length
        ? `<div class="sm-tree" style="--sm-color:${color};--sm-line:${lineColor}">${renderPreviewTree(data.pages, true)}</div>`
        : `<div class="sm-empty"><div class="empty-icon">🗺️</div><p>左パネルでページを追加すると<br>ここにプレビューが表示されます</p></div>`
      }
    </div>
  `;
}

function renderPreviewTree(pages, isRoot) {
  const items = pages.map(p => {
    const hasChildren = p.children.length > 0;
    const hasDesc = !!p.description;
    return `
      <li>
        <div class="sm-node-card" onclick="showDetailModal('${p.id}')">
          ${data.project.showIcon !== false ? `<span class="sm-node-icon">${p.icon}</span>` : ''}
          <span class="sm-node-name">${esc(p.name)}</span>
          ${hasDesc ? `<span class="sm-node-desc-hint">📝</span>` : ''}
          ${hasChildren ? `
            <button class="sm-toggle open" id="pvtb-${p.id}"
                    onclick="event.stopPropagation();pvToggle('${p.id}')">▼</button>
          ` : ''}
        </div>
        ${hasChildren ? `
          <div id="pvch-${p.id}" class="sm-node-children">
            ${renderPreviewTree(p.children, false)}
          </div>
        ` : ''}
      </li>
    `;
  }).join('');

  return `<ul>${items}</ul>`;
}

function pvToggle(id) {
  const ch = document.getElementById('pvch-' + id);
  const btn = document.getElementById('pvtb-' + id);
  if (!ch) return;
  const open = ch.style.display !== 'none';
  ch.style.display = open ? 'none' : '';
  btn.textContent = open ? '▶' : '▼';
  btn.classList.toggle('open', !open);
}

function showDetailModal(id) {
  const r = findPage(data.pages, id);
  if (!r) return;
  const p = r.page;
  document.getElementById('dm-icon').textContent = data.project.showIcon !== false ? p.icon : '';
  document.getElementById('dm-title').textContent = p.name;
  document.getElementById('dm-desc').innerHTML = p.description
    ? esc(p.description).replace(/\n/g,'<br>')
    : '<span style="color:#94A3B8;font-size:13px">掲載コンテンツが未入力です。左パネルの「掲載コンテンツ」欄に入力してください。</span>';
  document.getElementById('detail-modal').classList.add('show');
}

function closeDetailModal() {
  document.getElementById('detail-modal').classList.remove('show');
}

// ============================================================
// アイコンピッカー
// ============================================================

let _iconTargetId = null;
let _selectedIcon = null;

function openIconPicker(id) {
  _iconTargetId = id;
  const r = findPage(data.pages, id);
  _selectedIcon = r ? r.page.icon : '📄';

  const grid = document.getElementById('icon-grid');
  grid.innerHTML = ICONS.map(ico => `
    <button class="icon-option ${ico === _selectedIcon ? 'selected' : ''}"
            onclick="selectIconOption('${ico}',this)">${ico}</button>
  `).join('');

  document.getElementById('icon-picker').classList.add('show');
}

function selectIconOption(ico, btn) {
  document.querySelectorAll('.icon-option').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  _selectedIcon = ico;
}

function applyIcon() {
  if (_iconTargetId && _selectedIcon) {
    updatePageField(_iconTargetId, 'icon', _selectedIcon);
    renderEditor();
  }
  closeIconPicker();
}

function closeIconPicker() {
  document.getElementById('icon-picker').classList.remove('show');
  _iconTargetId = null;

// ============================================================
// HTMLエクスポート / PDFエクスポート
// ============================================================

function exportHTML() {
  if (!data.pages.length) {
    alert('ページが1つもありません。まずページを追加してください。');
    return;
  }

  const html = generateExportHTML();
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const siteName = data.project.name.replace(/[<>:"/\\|?*]/g,'_').slice(0,40);
  a.href = url;
  a.download = `sitemap_${siteName}_${data.project.date || todayStr()}.html`;
  a.click();
  URL.revokeObjectURL(url);

  showToast('✅ サイトマップをダウンロードしました');
}

function exportPDF() {
  if (!data.pages.length) {
    alert('ページが1つもありません。まずページを追加してください。');
    return;
  }
  // エクスポートHTMLにロード後自動印刷スクリプトを追加して新しいウィンドウで開く
  const html = generateExportHTML().replace(
    '</body>',
    `<script>window.addEventListener('load',()=>setTimeout(()=>window.print(),600));<\/script></body>`
  );
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  window.open(url, '_blank');
  showToast('🖨️ 印刷ダイアログが開きます（PDF保存を選択）');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --color:${color};
  --line:${lineColor};
  --bg:#F0F4FF;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;
  background:var(--bg);
  min-height:100vh;
  color:#0F172A;
}
.page-wrap{
  max-width:900px;
  margin:0 auto;
  padding:32px 20px 60px;
}
/* ヘッダー */
.sm-header{
  background:white;
  border-radius:16px;
  padding:28px 32px;
  margin-bottom:32px;
  box-shadow:0 4px 20px rgba(0,0,0,.07);
  border-top:5px solid var(--color);
}
.sm-header-top{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:8px;
}
.sm-logo{font-size:28px}
.sm-title{
  font-size:22px;
  font-weight:800;
  letter-spacing:-0.02em;
  color:#0F172A;
}
.sm-badge{
  padding:3px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
  letter-spacing:0.04em;
  background:color-mix(in srgb,var(--color) 15%,white);
  color:var(--color);
}
.sm-meta{
  font-size:13px;
  color:#64748B;
  margin-bottom:6px;
}
.sm-note{
  font-size:12px;
  color:#94A3B8;
  display:flex;
  align-items:center;
  gap:6px;
}
/* ツリー */
.tree ul{
  list-style:none;
  padding:0;
  margin:0;
  padding-left:24px;
  position:relative;
}
.tree ul::before{
  content:'';
  position:absolute;
  left:0;top:0;bottom:16px;
  width:2px;
  background:var(--line);
  border-radius:1px;
}
.tree li{
  position:relative;
  margin-bottom:8px;
}
.tree li::before{
  content:'';
  position:absolute;
  left:-24px;
  top:18px;
  width:20px;
  height:2px;
  background:var(--line);
}
.tree>ul>li::before{display:none}
.tree>ul::before{display:none}
/* ノードカード */
.node-card{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:11px 18px;
  background:white;
  border-radius:10px;
  box-shadow:0 2px 10px rgba(0,0,0,.07);
  cursor:pointer;
  border-left:4px solid var(--color);
  transition:all .2s;
  min-width:150px;
  max-width:500px;
  position:relative;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.node-card:hover{
  transform:translateX(4px);
  box-shadow:0 6px 20px rgba(0,0,0,.12);
  border-left-width:5px;
}
.node-card:active{transform:translateX(2px) scale(.99)}
.node-icon{font-size:18px;flex-shrink:0}
.node-name{
  font-size:14px;
  font-weight:600;
  color:#0F172A;
  flex:1;
  line-height:1.4;
}
.node-hint{
  font-size:10px;
  color:#94A3B8;
}
.node-toggle{
  width:22px;height:22px;
  border-radius:50%;
  background:#F1F5F9;
  border:none;
  cursor:pointer;
  font-size:9px;
  color:#64748B;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.node-toggle:hover{background:#E2E8F0}
.node-toggle.open{background:var(--color);color:white}
/* ルートノードは大きく */
.tree>ul>li>.node-card{
  padding:15px 22px;
  border-radius:12px;
  border-left-width:5px;
}
.tree>ul>li>.node-card .node-name{font-size:16px}
.tree>ul>li>.node-card .node-icon{font-size:22px}
/* 子コンテナ */
.node-children{
  margin-top:6px;
  overflow:hidden;
  transition:all .3s cubic-bezier(.4,0,.2,1);
}
/* モーダル */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
  padding:20px;
  backdrop-filter:blur(4px);
}
.modal-overlay.show{display:flex}
.modal-box{
  background:white;
  border-radius:20px;
  padding:28px;
  width:100%;
  max-width:420px;
  box-shadow:0 24px 60px rgba(0,0,0,.2);
  animation:modalIn .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes modalIn{
  from{opacity:0;transform:scale(.9) translateY(10px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}
.modal-header{
  display:flex;
  align-items:flex-start;
  gap:12px;
  margin-bottom:16px;
}
.modal-icon{font-size:32px;flex-shrink:0;line-height:1}
.modal-label{font-size:11px;color:#94A3B8;margin-bottom:4px}
.modal-title{font-size:18px;font-weight:800;letter-spacing:-.02em}
.modal-desc-box{
  background:#F8FAFC;
  border-radius:10px;
  padding:14px 16px;
  font-size:14px;
  color:#475569;
  line-height:1.8;
  min-height:60px;
  white-space:pre-wrap;
}
.modal-close{
  display:flex;
  width:100%;
  justify-content:flex-end;
  margin-top:16px;
}
.modal-close-btn{
  padding:8px 20px;
  border:1px solid #E2E8F0;
  border-radius:8px;
  background:transparent;
  font-size:13px;
  font-weight:500;
  cursor:pointer;
  color:#64748B;
}
.modal-close-btn:hover{background:#F1F5F9}
/* フッター */
.sm-footer{
  margin-top:48px;
  padding:20px;
  border-top:1px solid #E2E8F0;
  font-size:12px;
  color:#94A3B8;
  text-align:center;
  line-height:1.8;
}
/* スマホ対応 */
@media(max-width:600px){
  .page-wrap{padding:16px 12px 40px}
  .sm-header{padding:20px;border-radius:12px}
  .sm-title{font-size:18px}
  .node-card{min-width:120px;padding:9px 14px}
  .node-name{font-size:13px}
  .tree ul{padding-left:18px}
  .tree li::before{left:-18px;width:14px}
}
/* PDF保存ボタン */
.pdf-btn-wrap{
  display:flex;justify-content:flex-end;margin-bottom:20px;
}
.pdf-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 18px;
  background:white;
  border:1px solid #E2E8F0;
  border-radius:10px;
  font-size:13px;font-weight:600;color:#475569;
  cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.06);
  transition:all .15s;
}
.pdf-btn:hover{background:#F8FAFC;box-shadow:0 4px 12px rgba(0,0,0,.1);}
/* ノード説明（通常時非表示・印刷時表示） */
.node-desc{display:none;font-size:10px;color:#64748B;line-height:1.65;margin:4px 0 8px 10px;padding-left:14px;border-left:2px solid var(--line);white-space:pre-wrap}
/* 印刷時スタイル */
@page{size:A4;margin:12mm 15mm}
@media print{
  body{background:white !important}
  .page-wrap{max-width:none;padding:0}
  .sm-header{box-shadow:none;border-radius:6px;padding:14px 20px;margin-bottom:12px}
  .sm-note{display:none !important}
  .tree ul{padding-left:18px}
  .tree>ul{padding-left:0}
  .tree li{margin-bottom:4px}
  .node-children{display:block !important;margin-top:3px;overflow:visible}
  .node-desc{display:block !important}
  .node-hint{display:none}
  .node-card{box-shadow:none;border:none !important;background:transparent;padding:2px 0 !important;min-width:0;cursor:default;break-inside:avoid;break-after:avoid}
  .tree>ul>li>.node-card{padding:2px 0 !important}
  .node-card:hover{transform:none !important;box-shadow:none !important}
  .node-toggle{display:none !important}
  .modal-overlay{display:none !important}
  .pdf-btn-wrap{display:none !important}
  .sm-footer{margin-top:32px;padding:16px 0 0;border-top:1px solid #E2E8F0;background:transparent}
}
</style>
</head>
<body>
<div class="page-wrap">
  <div class="pdf-btn-wrap">
    <button class="pdf-btn" onclick="window.print()">🖨️ PDFで保存 / 印刷</button>
  </div>
  <div class="sm-header">
    <div class="sm-header-top">
      <span class="sm-title">${escExport(p.name || 'サイトマップ')}</span>
      <span class="sm-badge">SITE MAP</span>
    </div>
    ${metaParts.length ? `<div class="sm-meta">${metaParts.join('　|　')}</div>` : ''}
    <div class="sm-note">💬 各ブロックをタップ・クリックすると、掲載予定のコンテンツを確認できます</div>
  </div>
  <div class="${treeClass}" id="tree"></div>
</div>

<!-- モーダル -->
<div class="modal-overlay" id="modal" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-icon" id="m-icon"></span>
      <div>
        <div class="modal-label">掲載コンテンツ</div>
        <div class="modal-title" id="m-title"></div>
      </div>
    </div>
    <div class="modal-desc-box" id="m-desc"></div>
    <div class="modal-close">
      <button class="modal-close-btn" onclick="closeModal()">閉じる</button>
    </div>
  </div>
</div>

<script>
const PAGES = ${pagesJSON};
const SHOW_ICON = ${showIcon};

function findPage(pages, id) {
  for (const p of pages) {
    if (p.id === id) return p;
    const r = findPage(p.children, id);
    if (r) return r;
  }
  return null;
}

function buildTree(pages, isRoot) {
  const items = pages.map(p => {
    const hasChildren = p.children && p.children.length > 0;
    const hasDesc = !!p.description;
    return \`<li>
      <div class="node-card" onclick="openModal('\${p.id}')">
        \${SHOW_ICON ? '<span class="node-icon">' + p.icon + '</span>' : ''}
        <span class="node-name">\${escHtml(p.name)}</span>
        \${hasDesc ? '<span class="node-hint">📝</span>' : ''}
        \${hasChildren ? \`<button class="node-toggle open" id="tb-\${p.id}"
          onclick="event.stopPropagation();toggle('\${p.id}')">▼</button>\` : ''}
      </div>
      \${hasDesc ? '<div class="node-desc">' + escHtml(p.description) + '</div>' : ''}
      \${hasChildren ? \`
        <div class="node-children" id="ch-\${p.id}">\${buildTree(p.children, false)}</div>
      \` : ''}
    </li>\`;
  }).join('');
  return \`<ul>\${items}</ul>\`;
}

function toggle(id) {
  const ch = document.getElementById('ch-' + id);
  const btn = document.getElementById('tb-' + id);
  if (!ch) return;
  const isOpen = ch.style.display !== 'none';
  ch.style.display = isOpen ? 'none' : '';
  btn.textContent = isOpen ? '▶' : '▼';
  btn.classList.toggle('open', !isOpen);
}

function openModal(id) {
  const p = findPage(PAGES, id);
  if (!p) return;
  document.getElementById('m-icon').textContent = p.icon;
  document.getElementById('m-title').textContent = p.name;
  document.getElementById('m-desc').textContent = p.description || '（掲載コンテンツは別途ご確認ください）';
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
document.getElementById('tree').innerHTML = buildTree(PAGES, true);
<\/script>

${p.note ? `<div class="sm-footer">${escExport(p.note).replace(/\n/g,'<br>')}<br><br>🗺️ ${escExport(p.name || '')}</div>` : ''}
</body>
</html>`;
}

function escExport(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// カラーチップ初期化
// ============================================================

function initColorChips() {
  const container = document.getElementById('color-chips');
  container.innerHTML = COLORS.map(c => `
    <div class="color-chip ${c.value === data.project.color ? 'active' : ''}"
         data-color="${c.value}"
         style="background:${c.value}"
         title="${c.name}"
         onclick="setColor('${c.value}','${c.line}')"></div>
  `).join('');
}

// ============================================================
// 初期化
// ============================================================

document.addEventListener('DOMContentLoaded', () => {
  loadStored();
  syncFormToData();
  initColorChips();
  renderAll();
});
</script>
<script src="xml-sitemap.js"></script>
</body>
</html>
